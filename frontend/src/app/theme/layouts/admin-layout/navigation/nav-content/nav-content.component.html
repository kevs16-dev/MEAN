<!-- Vertical layout -->
<ng-scrollbar style="height: calc(100vh - 49px)" visibility="hover" id="nav-ps-mantis">
  <div class="navbar-content">
    <ul class="nav coded-inner-navbar" (click)="fireOutClick()" (mouseleave)="navMob()">
      @for (item of navigations; track item) {
        @if (item.type === 'group') {
          <app-nav-group [item]="item"></app-nav-group>
        }
      }
    </ul>
    <div class="nav-user-link-wrap">
      <a class="nav-user-link" routerLink="/profil" (click)="navMob()">
        <i antIcon type="user" theme="outline"></i>
        <span>{{ currentUserName }}</span>
      </a>
    </div>
  </div>
</ng-scrollbar>
