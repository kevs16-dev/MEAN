<app-card [cardTitle]="editMode ? 'Modifier le produit' : 'Nouveau produit'">
  <form (ngSubmit)="submit()">
    <div class="row">
      <div class="col-md-6">
        <h5 class="mb-3">Informations principales</h5>

        <div class="mb-3">
          <label class="form-label">Nom du produit</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="name"
            name="name"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea
            class="form-control"
            rows="4"
            [(ngModel)]="description"
            name="description"
          ></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Statut</label>
          <select
            class="form-select"
            [(ngModel)]="status"
            name="status"
          >
            <option value="ACTIVE">Actif</option>
            <option value="INACTIVE">Inactif</option>
            <option value="OUT_OF_STOCK">Rupture de stock</option>
          </select>
        </div>
      </div>

      <!-- Images -->
      <div class="col-md-6">
        <h5 class="mb-3">Images</h5>

        <div *ngFor="let img of images; let i = index" class="border rounded p-2 mb-2">
          <div class="mb-2">
            <label class="form-label">URL de l'image</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="img.url"
              [name]="'image-url-' + i"
            />
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                [checked]="img.isPrimary"
                (change)="setPrimaryImage(i)"
                [name]="'primary-image'"
              />
              <label class="form-check-label">
                Image principale
              </label>
            </div>
            <button
              type="button"
              class="btn btn-sm btn-outline-danger"
              (click)="removeImage(i)"
            >
              Supprimer
            </button>
          </div>
        </div>

        <button type="button" class="btn btn-outline-primary btn-sm" (click)="addImage()">
          Ajouter une image
        </button>
      </div>
    </div>

    <hr class="my-4" />

    <!-- Variantes -->
    <h5 class="mb-3">Variantes & stock</h5>

    <div class="table-responsive mb-3">
      <table class="table table-sm align-middle">
        <thead>
          <tr>
            <th>Attributs</th>
            <th>SKU</th>
            <th>Prix actuel</th>
            <th>Stock</th>
            <th>Seuil alerte</th>
            <th>Actif</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let v of variants; let i = index">
            <td>
              <div *ngFor="let att of v.attributes; let j = index" class="d-flex mb-1 gap-1">
                <input
                  type="text"
                  class="form-control form-control-sm"
                  placeholder="Nom (ex: Taille)"
                  [(ngModel)]="att.name"
                  [name]="'variant-' + i + '-att-name-' + j"
                />
                <input
                  type="text"
                  class="form-control form-control-sm"
                  placeholder="Valeur (ex: M)"
                  [(ngModel)]="att.value"
                  [name]="'variant-' + i + '-att-value-' + j"
                />
                <button
                  type="button"
                  class="btn btn-sm btn-outline-danger"
                  (click)="v.attributes.splice(j, 1)"
                >
                  ×
                </button>
              </div>
              <button
                type="button"
                class="btn btn-sm btn-outline-secondary"
                (click)="v.attributes.push({ name: '', value: '' })"
              >
                + Attribut
              </button>
            </td>
            <td>
              <input
                type="text"
                class="form-control form-control-sm"
                [(ngModel)]="v.sku"
                [name]="'variant-sku-' + i"
              />
            </td>
            <td>
              <input
                type="number"
                min="0"
                step="0.01"
                class="form-control form-control-sm"
                [(ngModel)]="v.currentPrice"
                [name]="'variant-price-' + i"
              />
            </td>
            <td>
              <input
                type="number"
                min="0"
                class="form-control form-control-sm"
                [(ngModel)]="v.stock"
                [name]="'variant-stock-' + i"
              />
            </td>
            <td>
              <input
                type="number"
                min="0"
                class="form-control form-control-sm"
                [(ngModel)]="v.lowStockAlertThreshold"
                [name]="'variant-threshold-' + i"
              />
            </td>
            <td class="text-center">
              <input
                type="checkbox"
                class="form-check-input"
                [(ngModel)]="v.isActive"
                [name]="'variant-active-' + i"
              />
            </td>
            <td class="text-end">
              <button
                type="button"
                class="btn btn-sm btn-outline-danger"
                (click)="removeVariant(i)"
              >
                Supprimer
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <button
      type="button"
      class="btn btn-outline-primary btn-sm mb-3"
      (click)="addVariant()"
    >
      Ajouter une variante
    </button>

    <div *ngIf="message" class="mt-3" [ngClass]="['alert', alertType]">
      {{ message }}
    </div>

    <div class="mt-3 d-flex justify-content-end">
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="!canSubmit() || loading"
      >
        {{ loading ? 'Enregistrement...' : (editMode ? 'Mettre à jour' : 'Créer le produit') }}
      </button>
    </div>
  </form>
</app-card>
