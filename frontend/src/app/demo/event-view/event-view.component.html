<div class="d-flex justify-content-between align-items-center mb-3">
  <h4>Mes évènements</h4>

  <!-- wrapper pour les boutons à droite -->
  <div class="d-flex gap-2">
    <button class="btn btn-outline-primary" (click)="toggleView()">
      {{ viewMode === 'calendar' ? 'Voir la liste' : 'Voir le calendrier' }}
    </button>
    <button
      type="button"
      class="btn btn-primary"
      (click)="router.navigate(['/admin/events/new'])"
    >
      Nouveau +
    </button>
  </div>
</div>

<div *ngIf="viewMode === 'calendar'">
  <full-calendar [options]="calendarOptions"></full-calendar>
</div>

<div *ngIf="viewMode === 'list'">

  <!-- Filtres -->
  <div class="row mb-3">
    <div class="col-md-4">
      <input
        type="text"
        class="form-control"
        placeholder="Rechercher un évènement..."
        [(ngModel)]="searchTerm"
        (ngModelChange)="currentPage = 1"
      />
    </div>

    <div class="col-md-3">
      <select
        class="form-select"
        [(ngModel)]="dateFilter"
        (change)="currentPage = 1"
      >
        <option value="ALL">Tous</option>
        <option value="UPCOMING">À venir</option>
        <option value="PAST">Passés</option>
      </select>
    </div>
  </div>

  <!-- Liste -->
<div class="list-group">
    <div
      *ngFor="let e of paginatedEvents"
      class="list-group-item list-group-item-action"
    >
      <div class="d-flex justify-content-between">
        <h5 class="mb-1">{{ e.title }}</h5>
        <span class="badge bg-secondary">
          {{ e.startDate | date:'dd/MM/yyyy' }}
        </span>
      </div>

      <p class="mb-1">{{ e.description }}</p>

      <small class="text-muted">
        <span class="me-2">
          <i class="ti ti-calendar-event me-1"></i>
          {{ e.startDate | date:'dd/MM/yyyy' }} – {{ e.endDate | date:'dd/MM/yyyy' }}
        </span>
        <br />
        <span>
          <i class="ti ti-map-pin me-1"></i>
          {{ e.location || '—' }}
        </span>
      </small>
    </div>

    <div *ngIf="filteredEvents.length === 0" class="text-muted text-center py-3">
      Aucun évènement trouvé
    </div>
  </div>

  <!-- Pagination -->
  <nav *ngIf="totalPages > 1" class="mt-3">
    <ul class="pagination justify-content-center">
      <li class="page-item" [class.disabled]="currentPage === 1">
        <button class="page-link" (click)="changePage(currentPage - 1)">
          Précédent
        </button>
      </li>

      <li
        class="page-item"
        *ngFor="let page of [].constructor(totalPages); let i = index"
        [class.active]="currentPage === i + 1"
      >
        <button class="page-link" (click)="changePage(i + 1)">
          {{ i + 1 }}
        </button>
      </li>

      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <button class="page-link" (click)="changePage(currentPage + 1)">
          Suivant
        </button>
      </li>
    </ul>
  </nav>
</div>
