<div class="shop-detail-container">
  <div class="mb-3">
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="goBack()">
      <i antIcon type="arrow-left" theme="outline" class="me-1"></i>
      Retour aux boutiques
    </button>
  </div>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3 text-muted">Chargement des détails...</p>
  </div>

  <div *ngIf="!isLoading && error" class="alert alert-danger">
    {{ error }}
  </div>

  <div *ngIf="!isLoading && !error && shop" class="shop-detail-card">
    <div class="shop-detail-header">
      <div class="shop-detail-cover" *ngIf="shop.coverImage">
        <img
          [src]="shop.coverImage"
          [alt]="shop.name"
          (error)="$event.target.src='assets/images/shop-placeholder.jpg'"
        />
      </div>
      <div class="shop-detail-header-content">
        <div class="shop-detail-logo" *ngIf="shop.logo">
          <img [src]="shop.logo" [alt]="shop.name" />
        </div>
        <h1 class="shop-detail-title">{{ shop.name }}</h1>
        <span class="badge bg-primary">{{ getCategoryName() }}</span>
        <p class="shop-detail-location mt-2 mb-0">
          <i antIcon type="environment" theme="outline" class="me-1"></i>
          {{ getLocationString() }}
        </p>
      </div>
    </div>

    <div class="shop-detail-body">
      <section *ngIf="shop.description" class="mb-4">
        <h5><i antIcon type="file-text" theme="outline" class="me-2"></i>Description</h5>
        <p class="text-muted mb-0">{{ shop.description }}</p>
      </section>

      <section class="mb-4" *ngIf="shop.contact?.phone || shop.contact?.email">
        <h5><i antIcon type="phone" theme="outline" class="me-2"></i>Contact</h5>
        <ul class="list-unstyled mb-0">
          <li *ngIf="shop.contact?.phone">
            <i antIcon type="phone" theme="outline" class="me-2"></i>{{ shop.contact.phone }}
          </li>
          <li *ngIf="shop.contact?.email">
            <i antIcon type="mail" theme="outline" class="me-2"></i>
            <a [href]="'mailto:' + shop.contact.email">{{ shop.contact.email }}</a>
          </li>
        </ul>
      </section>

      <section class="mb-4">
        <h5><i antIcon type="clock-circle" theme="outline" class="me-2"></i>Horaires d'ouverture</h5>
        <div class="table-responsive">
          <table class="table table-sm">
            <tbody>
              <tr *ngFor="let day of DAYS">
                <td class="fw-semibold" style="width: 140px;">{{ day.label }}</td>
                <td>{{ getOpeningHours(day.key) }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <div class="shop-detail-actions">
        <button type="button" class="btn btn-primary" (click)="goToProducts()">
          <i antIcon type="shopping" theme="outline" class="me-1"></i>
          Voir les produits
        </button>
      </div>
    </div>
  </div>
</div>
