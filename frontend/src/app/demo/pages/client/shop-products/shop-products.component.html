<div class="shop-products-container">
  <div class="mb-3">
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="goBackToShops()">
      <i antIcon type="arrow-left" theme="outline" class="me-1"></i>
      Retour aux boutiques
    </button>
  </div>

  <app-card [cardTitle]="shop ? 'Produits - ' + shop.name : 'Produits'">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
      <div class="d-flex align-items-center flex-wrap gap-2">
        <label for="searchProducts" class="form-label mb-0">Rechercher :</label>
        <input
          id="searchProducts"
          type="text"
          class="form-control w-auto"
          style="min-width: 180px;"
          placeholder="Nom, description..."
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearch()"
        />
        <label for="limitSelect" class="form-label mb-0 ms-2">Afficher :</label>
        <select
          id="limitSelect"
          class="form-select w-auto"
          [ngModel]="limit"
          (ngModelChange)="onLimitChange($event)"
        >
          <option *ngFor="let l of limits" [ngValue]="l">{{ l }}</option>
        </select>
        <span class="ms-1">par page</span>
      </div>
    </div>

    <div *ngIf="isLoading" class="text-center py-4">
      <span>Chargement des produits...</span>
    </div>

    <div *ngIf="!isLoading && error" class="alert alert-danger">
      {{ error }}
    </div>

    <div *ngIf="!isLoading && !error && products.length === 0" class="alert alert-info">
      Aucun produit trouvé. Modifiez votre recherche.
    </div>

    <div *ngIf="!isLoading && !error && products.length > 0" class="table-responsive">
      <table class="table table-striped align-middle">
        <thead>
          <tr>
            <th>Image</th>
            <th>Nom</th>
            <th>Description</th>
            <th>Explorer</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of products">
            <td>
              <img *ngIf="getProductImageUrl(p)" [src]="getProductImageUrl(p)" alt="" class="product-list-thumb" />
              <span *ngIf="!getProductImageUrl(p)" class="product-list-thumb product-list-thumb-placeholder">—</span>
            </td>
            <td>{{ p.name }}</td>
            <td class="product-description-cell">{{ p.description || '—' }}</td>
            <td>
              <span class="text-muted small">—</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <nav *ngIf="!isLoading && totalPages > 1" class="mt-3">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span class="text-muted small">
          {{ (page - 1) * limit + 1 }} – {{ (page - 1) * limit + products.length }} sur {{ total }}
        </span>
        <ul class="pagination mb-0">
          <li class="page-item" [class.disabled]="page === 1">
            <button type="button" class="page-link" (click)="goToPage(page - 1)">Précédent</button>
          </li>
          <li
            class="page-item"
            *ngFor="let p of [].constructor(totalPages); let idx = index"
            [class.active]="page === idx + 1"
          >
            <button type="button" class="page-link" (click)="goToPage(idx + 1)">{{ idx + 1 }}</button>
          </li>
          <li class="page-item" [class.disabled]="page === totalPages">
            <button type="button" class="page-link" (click)="goToPage(page + 1)">Suivant</button>
          </li>
        </ul>
      </div>
    </nav>
  </app-card>
</div>
